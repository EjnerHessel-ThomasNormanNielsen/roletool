<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8" />
  <title>Role Assignment Tool v6 (Auto GitHub)</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-6">
<div class="max-w-7xl mx-auto">
  <h1 class="text-2xl font-bold mb-4">Role Assignment Tool v6</h1>

  <div class="flex gap-2 mb-3">
    <input id="search" placeholder="Søg..." class="flex-1 p-2 border rounded" />
    <button onclick="toggleEdit()" class="bg-black text-white px-3 rounded">✏️ Edit</button>
    <button onclick="saveToGitHub()" class="bg-green-600 text-white px-3 rounded">💾 Gem</button>
  </div>

  <table class="w-full bg-white rounded shadow text-sm">
    <thead class="bg-gray-200">
      <tr>
        <th class="p-2">Assigner</th>
        <th class="p-2">System</th>
        <th class="p-2">Rollenavn</th>
        <th class="p-2">Noter</th>
        <th class="p-2">Tildeles i</th>
        <th class="p-2">Handling</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
</div>

<script>
let data = [];
let editMode = false;

// ⚠️ SKAL UDFYLDES
const GITHUB_USER = "EjnerHessel-ThomasNormanNielsen";
const REPO = "roletool";
const FILE_PATH = "roles.json";
const TOKEN = "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";

async function loadData(){
  const res = await fetch('roles.json');
  data = await res.json();
  render();
}

function render(){
  const tbody = document.getElementById('tableBody');
  const search = document.getElementById('search').value.toLowerCase();
  tbody.innerHTML='';

  data.filter(r => Object.values(r).join(' ').toLowerCase().includes(search))
  .forEach((r,i)=>{
    tbody.innerHTML += `
    <tr class="border-t">
      <td ${editMode?'contenteditable':''} oninput="editField(${i},'assigner',this.innerText)">${r.assigner}</td>
      <td ${editMode?'contenteditable':''} oninput="editField(${i},'system',this.innerText)">${r.system}</td>
      <td ${editMode?'contenteditable':''} oninput="editField(${i},'rolle',this.innerText)">${r.rolle}</td>
      <td ${editMode?'contenteditable':''} oninput="editField(${i},'beskrivelse',this.innerText)">${r.beskrivelse}</td>
      <td ${editMode?'contenteditable':''} oninput="editField(${i},'tildeles',this.innerText)">${r.tildeles||''}</td>
      <td><button onclick="deleteRole(${i})">🗑️</button></td>
    </tr>`;
  });
}

function toggleEdit(){
  editMode = !editMode;
  render();
}

function editField(i,key,val){ data[i][key]=val; }
function deleteRole(i){ data.splice(i,1); render(); }

async function getFileSHA(){
  const res = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${REPO}/contents/${FILE_PATH}`,{
    headers:{ Authorization:`token ${TOKEN}` }
  });
  const json = await res.json();
  return json.sha;
}

async function saveToGitHub(){
  const sha = await getFileSHA();

  await fetch(`https://api.github.com/repos/${GITHUB_USER}/${REPO}/contents/${FILE_PATH}`,{
    method:'PUT',
    headers:{
      Authorization:`token ${TOKEN}`,
      'Content-Type':'application/json'
    },
    body: JSON.stringify({
      message:'Update roles.json',
      content: btoa(unescape(encodeURIComponent(JSON.stringify(data, null, 2)))),
      sha: sha
    })
  });

  alert('Gemt til GitHub ✅');
}

document.getElementById('search').addEventListener('input', render);
loadData();
</script>
</body>
</html>
